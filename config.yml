baseURL: https://mdr50.eu/
languageCode: en-us
title: mdr50.eu
theme: "papermod"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
minify:
  disableXML: true
  minifyOutput: true
params:
  socialIcons:
        - name: Rss
          url: "index.xml"
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: There and back
  description: "A family's writing and photography"
  keywords: [Janet Reider, Matthew Reider, Deborah Green]
  # author: ["Me", "You"] # multiple authors
  DateFormat: "January 2, 2006"
  defaultTheme: light # dark, light
  disableThemeToggle: true
  ShowReadingTime: false
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: false
  disableSpecial1stPost: true
  disableScrollToTop: true
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  taxonomies:
    post: posts
  