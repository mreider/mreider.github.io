baseURL: https://mdr50.eu/
languageCode: en-us
title: mdr50.eu
theme: "papermod"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
minify:
  disableXML: true
  minifyOutput: true
params:
  socialIcons:
        - name: Rss
          url: "index.xml"
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: mdr50.eu
  description: "Matt Reider's blog"
  keywords: [Matt Reider]
  # author: ["Me", "You"] # multiple authors
  DateFormat: "January 2, 2006"
  defaultTheme: light # dark, light
  disableThemeToggle: true
  ShowReadingTime: false
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: false
  disableSpecial1stPost: true
  disableScrollToTop: true
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  homeInfoParams:
    Title: "Welcome"
    Content: Matt's blog
    cover:
    hidden: false # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page
  profileMode:
    enabled: true
    title: "Matt's blog" # optional default will be site title
    imageUrl: "images/me.png" # optional
    imageWidth: 150 # custom size
    imageHeight: 150 # custom size
    buttons:
        - name: Travel posts
          url: "/posts/travel"
        - name: Other writing
          url: "/posts/writing"
        - name: German with Rammstein
          url: "/posts/german-with-rammstein"
menu:
  main:
    - identifier: posts
      name: posts
      url: /posts/
      weight: 1
  